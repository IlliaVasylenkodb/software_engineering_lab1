<!DOCTYPE html>
<html lang="uk">
<head>

            font-family: 'Segoe UI', sans-serif;

        .container {
            text-align: center;
            padding: 2rem;

        h1 { margin: 0; font-size: 2.5rem; color: #00ff88; }
        p { color: #888; margin: 15px 0; }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #121212;
            background: #00ff88;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); background: #00cc6e; }

</head>
